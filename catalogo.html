<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Hotel Quinta Dalam</title>
    <meta name="description" content="Explora nuestro catálogo de habitaciones temáticas inspiradas en los Pueblos Mágicos de México.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .rooms-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0;
            list-style: none;
            margin: 20px 0;
        }
        .room-item {
            background-color: #f8f1e5;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #d7ccc8;
            transition: transform 0.2s, background-color 0.2s;
        }
        .room-item:hover {
            transform: translateY(-3px);
            background-color: #efebe9;
        }
    </style>
</head>
<body class="body-style" id="app">
    <header class="header-style">
        <h1>{{ headerTitle }}</h1>
    </header>
    <nav>
        <div class="nav-wrapper">
             <button class="btn-style" @click="goTo('index.html')">
                  Inicio
             </button>
        </div>
    </nav>
    <main class="main-style">
         <p v-for="p in introParagraphs" :key="p">{{ p }}</p>
         
         <div v-if="loading">Cargando catálogo...</div>
         <div v-else-if="error">{{ error }}</div>
         <ul v-else class="rooms-list">
            <li v-for="product in products" 
                :key="product.id" 
                class="room-item" 
                @click="selectItem(product)">
                <strong>{{ product.nombre }}</strong><br>
                <small>{{ product.categoria }}</small><br>
                ${{ product.precio }}
            </li>
         </ul>

         <img class="img-style" src="imágenes_hotel/Cuarto.jpg" alt="Habitación Paracho del Hotel Quinta Dalam">
    </main>
    <footer class="footer-style">
            <h2>{{ footerTitle }}</h2>
            <ul>
                <li v-for="social in socialLinks" :key="social.name">
                    <a target="_blank" :href="social.url">{{ social.name }}</a>
                </li>
            </ul>
            <p>© 2024 Hotel Quinta Dalam. Todos los derechos reservados.</p>
            <p>
                <a href="https://validator.w3.org/nu/?doc=https%3A%2F%2Frogerts-oa.github.io%2FProgramacion-web-APC-ROA%2F">
                    <img src="http://www.w3.org/Icons/valid-html401" alt="Valid HTML!" height="31" width="88" >
                </a>
            </p>
            <p>
                <a href="https://jigsaw.w3.org/css-validator/validator?uri=https%3A%2F%2Frogerts-oa.github.io%2FProgramacion-web-APC-ROA%2F&profile=css3svg&usermedium=all&warning=1&vextwarning=&lang=es">
                    <img style="border:0;width:88px;height:31px" src="http://jigsaw.w3.org/css-validator/images/vcss" alt="¡CSS Válido!" >
                </a>
            </p>  
    </footer>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const headerTitle = ref('Habitaciones y Servicios');
                const footerTitle = ref('Contacto');
                const products = ref([]);
                const loading = ref(true);
                const error = ref(null);
                
                const introParagraphs = ref([
                    "En el Hotel Quinta Dalam, cada habitación es un homenaje a la riqueza cultural de los Pueblos Mágicos de México. Nuestro catálogo de habitaciones temáticas te invita a sumergirte en la esencia de cada destino, ofreciéndote una experiencia única que combina confort moderno con la magia ancestral de nuestras tradiciones.",
                    "Explore nuestra variedad de servicios diseñados para hacer su estancia inolvidable."
                ]);

                const socialLinks = ref([
                    { name: 'Facebook', url: 'https://www.facebook.com/profile.php?id=61584681841684' },
                    { name: 'Instagram', url: 'https://www.instagram.com/quintadalam?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==' },
                    { name: 'TikTok', url: 'https://www.tiktok.com/@quintadalam?lang=es' }
                ]);

                const fetchProducts = async () => {
                    try {
                        const response = await axios.get('/api/products');
                        products.value = response.data;
                    } catch (err) {
                        console.error("Error al cargar productos:", err);
                        error.value = "No se pudieron cargar los datos del catálogo.";
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    fetchProducts();
                });

                const goTo = (url) => { window.location.href = url; };

                const selectItem = (product) => {
                    alert(`Has seleccionado: ${product.nombre} - Precio: $${product.precio}`);
                };

                return {
                    headerTitle, footerTitle, introParagraphs, products, socialLinks, loading, error, goTo, selectItem
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
