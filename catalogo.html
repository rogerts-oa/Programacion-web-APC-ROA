<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones - Hotel Quinta Dalam</title>
    <meta name="description" content="Explora nuestro catálogo de habitaciones temáticas inspiradas en los Pueblos Mágicos de México.">

    <link rel="stylesheet" href="styles.css">

    <!-- Librerías de Vue 3 y Axios -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 25px;
            padding: 20px 5px;
            scroll-behavior: auto; /* Cambiado a auto para que el incremento manual de scrollLeft sea instantáneo */
            -webkit-overflow-scrolling: touch;
        }

        /* Ocultar scrollbar pero permitir scroll */
        .horizontal-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .horizontal-scroll::-webkit-scrollbar-thumb {
            background: rgba(141, 110, 99, 0.3);
            border-radius: 10px;
        }

        .room-card {
            flex: 0 0 320px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
            border: 1px solid #eee;
        }

        .room-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-medium);
            border-color: var(--secondary-color);
        }

        .room-img-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .room-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .room-card:hover .room-img {
            transform: scale(1.1);
        }

        .room-info {
            padding: 25px;
        }

        .room-info h3 {
            margin: 0 0 10px;
            color: var(--primary-color);
            font-size: 1.4rem;
        }

        .room-price {
            font-size: 1.2rem;
            color: var(--secondary-color);
            font-weight: 700;
            margin-bottom: 20px;
        }

        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
    </style>
</head>

<body class="body-style">
    <div id="app" v-cloak>
        <nav class="navbar">
            <a href="index.html" class="nav-brand">QUINTA DALAM</a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Habitaciones</a>
                <a href="nosotros.html">Nosotros</a>
                <a href="formulario.html" v-if="user && user.role === 'Admin'">Gestión</a>
                <template v-if="!user">
                    <a href="login.html" class="btn-nav">Iniciar Sesión</a>
                </template>
                <template v-else>
                    <div class="user-menu" @click="toggleDropdown">
                        {{ user.username }}
                        <div class="user-dropdown" v-if="dropdownOpen">
                            <a href="#" @click.prevent="handleLogout">Cerrar Sesión</a>
                        </div>
                    </div>
                </template>
            </div>
        </nav>

        <header class="header-style">
            <h1>Nuestras Habitaciones</h1>
            <p>Tradición y confort en cada detalle</p>
        </header>

        <main class="main-style">
            <div class="catalog-container">
                <div v-if="loading" style="text-align: center; padding: 50px;">
                    <p>Cargando habitaciones...</p>
                </div>
                
                <!-- Contenedor con Autoscroll y Ref -->
                <div v-else 
                     ref="scrollContainer" 
                     class="horizontal-scroll"
                     @mouseenter="stopAutoScroll"
                     @mouseleave="startAutoScroll">
                    <div v-for="room in rooms" :key="room.id" class="room-card">
                        <div class="room-img-container">
                            <!-- Imagen por defecto corregida -->
                            <img :src="room.imagen_url || 'imágenes_hotel/Cuarto.jpg'" 
                                 class="room-img" 
                                 :alt="room.nombre">
                        </div>
                        <div class="room-info">
                            <h3>{{ room.nombre }}</h3>
                            <p class="room-price">${{ room.precio }} <small>/ noche</small></p>
                            <button class="btn-style" style="width: 100%">Reservar Ahora</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer-style">
            <div class="footer-content">
                <div class="social-icons">
                    <a href="#"><img src="imágenes_hotel/icons/facebook.svg" alt="Facebook"></a>
                    <a href="#"><img src="imágenes_hotel/icons/instagram.svg" alt="Instagram"></a>
                    <a href="#"><img src="imágenes_hotel/icons/tiktok.svg" alt="TikTok"></a>
                </div>
                <p class="copyright">© 2024 Hotel Quinta Dalam. Todos los derechos reservados.</p>
                <div class="w3c-badges">
                    <img src="http://www.w3.org/Icons/valid-html401" alt="Valid HTML!">
                    <img src="http://jigsaw.w3.org/css-validator/images/vcss" alt="¡CSS Válido!">
                </div>
            </div>
        </footer>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const { createApp, ref, onMounted, onBeforeUnmount, nextTick } = Vue;

        createApp({
            setup() {
                const auth = authShared.setup();
                const rooms = ref([]);
                const loading = ref(true);
                const scrollContainer = ref(null);
                let scrollInterval = null;

                const fetchRooms = async () => {
                    try {
                        const response = await axios.get('/api/products');
                        rooms.value = response.data;
                        
                        // Esperar a que el DOM se actualice antes de iniciar el scroll
                        await nextTick();
                        startAutoScroll();
                    } catch (err) {
                        console.error("Error al cargar habitaciones");
                    } finally {
                        loading.value = false;
                    }
                };

                const startAutoScroll = () => {
                    if (scrollInterval) return;
                    
                    scrollInterval = setInterval(() => {
                        if (scrollContainer.value) {
                            const container = scrollContainer.value;
                            // Si llega al final, vuelve al principio de forma instantánea
                            if (container.scrollLeft + container.clientWidth >= container.scrollWidth - 1) {
                                container.scrollLeft = 0;
                            } else {
                                container.scrollLeft += 1; // Incremento de 1px para fluidez
                            }
                        }
                    }, 30); // 30ms para un movimiento suave
                };

                const stopAutoScroll = () => {
                    if (scrollInterval) {
                        clearInterval(scrollInterval);
                        scrollInterval = null;
                    }
                };

                onMounted(fetchRooms);
                onBeforeUnmount(stopAutoScroll);

                return { ...auth, rooms, loading, scrollContainer, startAutoScroll, stopAutoScroll };
            }
        }).mount('#app');
    </script>
</body>

</html>
