<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Hotel Quinta Dalam</title>
    
    <link rel="stylesheet" href="styles.css">

    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .auth-card {
            max-width: 450px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-medium);
        }
        .auth-toggle {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        .auth-toggle button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #888;
            font-weight: 500;
            transition: all 0.3s;
        }
        .auth-toggle button.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }
        .feedback { margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body class="body-style">
    <div id="app" v-cloak>
        <nav class="navbar">
            <a href="index.html" class="nav-brand">QUINTA DALAM</a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Habitaciones</a>
                <a href="nosotros.html">Nosotros</a>
                <a href="formulario.html" v-if="user && user.role === 'Admin'">Gestión</a>
                <a v-if="!user" href="login.html" class="btn-nav">Iniciar Sesión</a>
                <div v-else class="user-menu">
                    {{ user.username }}
                    <div class="user-dropdown">
                        <a href="#" @click.prevent="handleLogout">Cerrar Sesión</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-style">
            <div class="auth-card">
                <div class="auth-toggle">
                    <button :class="{ active: isLogin }" @click="isLogin = true">Iniciar Sesión</button>
                    <button :class="{ active: !isLogin }" @click="isLogin = false">Registrarse</button>
                </div>

                <!-- Login -->
                <form v-if="isLogin" @submit.prevent="handleLogin">
                    <label>Usuario</label>
                    <input type="text" v-model="loginData.username" required placeholder="Nombre de usuario">
                    
                    <label>Contraseña</label>
                    <input type="password" v-model="loginData.password" required placeholder="Contraseña">
                    
                    <button type="submit" class="btn-style" style="width:100%" :disabled="authLoading">
                        {{ authLoading ? 'Cargando...' : 'Entrar' }}
                    </button>
                    <p v-if="message" :class="['feedback', messageType]">{{ message }}</p>
                </form>

                <!-- Registro -->
                <form v-else @submit.prevent="handleRegister">
                    <label>Nombre de Usuario</label>
                    <input type="text" v-model="registerData.username" @input="checkUsername" placeholder="Mínimo 3 caracteres">
                    <p v-if="usernameExists === true" class="feedback error">Ya ocupado</p>
                    
                    <label>Email</label>
                    <input type="email" v-model="registerData.email" required placeholder="correo@ejemplo.com">
                    
                    <label>Contraseña</label>
                    <input type="password" v-model="registerData.password" required placeholder="Mínimo 6 caracteres">
                    
                    <button type="submit" class="btn-style" style="width:100%" :disabled="authLoading || usernameExists !== false">
                        {{ authLoading ? 'Registrando...' : 'Crear Cuenta' }}
                    </button>
                    <p v-if="message" :class="['feedback', messageType]">{{ message }}</p>
                </form>
            </div>
        </main>

        <footer class="footer-style">
            <div class="footer-content">
                <h3>Contacto</h3>
                <div class="social-icons">
                    <a href="#"><img src="imágenes_hotel/icons/facebook.svg" alt="Facebook"></a>
                    <a href="#"><img src="imágenes_hotel/icons/instagram.svg" alt="Instagram"></a>
                    <a href="#"><img src="imágenes_hotel/icons/tiktok.svg" alt="TikTok"></a>
                </div>
                <p class="copyright">© 2024 Hotel Quinta Dalam. Todos los derechos reservados.</p>
                <div class="w3c-badges">
                    <img src="http://www.w3.org/Icons/valid-html401" alt="Valid HTML!">
                    <img src="http://jigsaw.w3.org/css-validator/images/vcss" alt="¡CSS Válido!">
                </div>
            </div>
        </footer>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const { createApp, ref, reactive } = Vue;

        createApp({
            setup() {
                const auth = authShared.setup();
                const isLogin = ref(true);
                const authLoading = ref(false);
                const message = ref('');
                const messageType = ref('');
                const usernameExists = ref(null);

                const loginData = reactive({ username: '', password: '' });
                const registerData = reactive({ username: '', email: '', password: '' });

                const checkUsername = async () => {
                    if (registerData.username.length < 3) return;
                    const res = await axios.get(`/api/users/check/${registerData.username}`);
                    usernameExists.value = res.data.exists;
                };

                const handleLogin = async () => {
                    authLoading.value = true;
                    try {
                        const res = await axios.post('/api/users/login', loginData);
                        alert('¡Bienvenido!');
                        window.location.href = 'index.html';
                    } catch (err) {
                        messageType.value = 'error';
                        message.value = 'Credenciales inválidas';
                    } finally { authLoading.value = false; }
                };

                const handleRegister = async () => {
                    authLoading.value = true;
                    try {
                        await axios.post('/api/users/register', { ...registerData, role: 'Cliente' });
                        messageType.value = 'success'; message.value = '¡Registro exitoso!';
                        setTimeout(() => isLogin.value = true, 2000);
                    } catch (err) {
                        messageType.value = 'error'; message.value = 'Error al registrar';
                    } finally { authLoading.value = false; }
                };

                return { ...auth, isLogin, authLoading, message, messageType, usernameExists, loginData, registerData, checkUsername, handleLogin, handleRegister };
            }
        }).mount('#app');
    </script>
</body>
</html>
