<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión - Hotel Quinta Dalam</title>
    <meta name="description" content="Gestión administrativa para el Hotel Quinta Dalam.">
    
    <link rel="stylesheet" href="styles.css">

    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="body-style">
    <div id="app" v-cloak>
        <nav class="navbar">
            <a href="index.html" class="nav-brand">QUINTA DALAM</a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Habitaciones</a>
                <a href="nosotros.html">Nosotros</a>
                <a href="formulario.html" v-if="user && user.role === 'Admin'">Gestión</a>
                <template v-if="!user">
                    <a href="login.html" class="btn-nav">Iniciar Sesión</a>
                </template>
                <template v-else>
                    <div class="user-menu">
                        <i class="fas fa-user-circle"></i> {{ user.username }}
                        <div class="user-dropdown">
                            <a href="#" @click.prevent="handleLogout">Cerrar Sesión</a>
                        </div>
                    </div>
                </template>
            </div>
        </nav>

        <header class="header-style">
            <h1>Gestión de Habitaciones</h1>
        </header>

        <main class="main-style">
            <div v-if="!user || user.role !== 'Admin'" style="text-align:center; padding: 50px;">
                <i class="fas fa-lock fa-3x" style="color: #d32f2f; margin-bottom: 20px;"></i>
                <h2>Acceso Restringido</h2>
                <p>Solo los administradores pueden acceder a esta sección.</p>
                <a href="index.html" class="btn-style" style="display:inline-block; margin-top:20px;">Volver al Inicio</a>
            </div>

            <template v-else>
                <p>Utilice los formularios para gestionar las habitaciones y servicios del hotel.</p>

                <!-- Formulario Alta -->
                <section class="form-section">
                    <h2 style="margin-bottom: 20px;">Alta de Habitación</h2>
                    <form @submit.prevent="submitAlta">
                        <label for="nombreAlta">Nombre:</label>
                        <input type="text" id="nombreAlta" v-model="formAlta.nombre" @blur="validateAlta">
                        <span v-if="errorsAlta.nombre" class="error-message">{{ errorsAlta.nombre }}</span>
                        
                        <label for="precioAlta">Precio:</label>
                        <input type="number" id="precioAlta" v-model.number="formAlta.precio" @blur="validateAlta">
                        <span v-if="errorsAlta.precio" class="error-message">{{ errorsAlta.precio }}</span>

                        <button class="btn-style" type="submit" :disabled="hasErrorsAlta">Agregar Habitación</button>
                        <p v-if="successAlta" class="valid-message">¡Agregada con éxito!</p>
                    </form>
                </section>

                <!-- Formulario Modificar -->
                <section class="form-section">
                    <h2 style="margin-bottom: 20px;">Modificar Habitación</h2>
                    <form @submit.prevent="submitModificar">
                        <label for="nombreModificar">Seleccionar:</label>
                        <input list="habitaciones" id="nombreModificar" v-model="formModificar.nombre" @blur="validateModificar">
                        <datalist id="habitaciones">
                            <option v-for="room in rooms" :key="room" :value="room">
                        </datalist>
                        
                        <label for="precioModificar">Nuevo precio:</label>
                        <input type="number" id="precioModificar" v-model.number="formModificar.precio" @blur="validateModificar">

                        <button class="btn-style" type="submit" :disabled="hasErrorsModificar">Modificar Habitación</button>
                    </form>
                </section>
            </template>
        </main>

        <footer class="footer-style">
            <div class="footer-content">
                <h3>Contacto</h3>
                <div class="social-icons">
                    <a href="#"><img src="imágenes_hotel/icons/facebook.svg" alt="Facebook"></a>
                    <a href="#"><img src="imágenes_hotel/icons/instagram.svg" alt="Instagram"></a>
                    <a href="#"><img src="imágenes_hotel/icons/tiktok.svg" alt="TikTok"></a>
                </div>
                <p class="copyright">© 2024 Hotel Quinta Dalam. Todos los derechos reservados.</p>
                <div class="w3c-badges">
                    <img src="http://www.w3.org/Icons/valid-html401" alt="Valid HTML!">
                    <img src="http://jigsaw.w3.org/css-validator/images/vcss" alt="¡CSS Válido!">
                </div>
            </div>
        </footer>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const { createApp, ref, reactive, computed } = Vue;

        createApp({
            setup() {
                const auth = authShared.setup();
                const rooms = ref(['Tzintzuntzan', 'Paracho', 'Yunuén', 'Pátzcuaro', 'Janitzio']);
                
                const formAlta = reactive({ nombre: '', precio: null });
                const errorsAlta = reactive({ nombre: null, precio: null });
                const successAlta = ref(false);

                const validateAlta = () => {
                    errorsAlta.nombre = !formAlta.nombre ? 'El nombre es obligatorio' : null;
                    errorsAlta.precio = !formAlta.precio || formAlta.precio <= 0 ? 'El precio debe ser mayor a 0' : null;
                };

                const hasErrorsAlta = computed(() => !formAlta.nombre || !formAlta.precio || formAlta.precio <= 0);

                const submitAlta = () => {
                    validateAlta();
                    if (!hasErrorsAlta.value) { successAlta.value = true; setTimeout(() => successAlta.value = false, 3000); }
                };

                const formModificar = reactive({ nombre: '', precio: null });
                const validateModificar = () => {};
                const hasErrorsModificar = computed(() => !formModificar.nombre || !formModificar.precio);
                const submitModificar = () => {};

                return {
                    ...auth, rooms, formAlta, errorsAlta, successAlta, validateAlta, hasErrorsAlta, submitAlta,
                    formModificar, validateModificar, hasErrorsModificar, submitModificar
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
