<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Hotel Quinta Dalam</title>
    <meta name="description" content="Descubre el Hotel Quinta Dalam, un refugio colonial en el corazón de los Pueblos Mágicos de México.">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    
    <!-- Vue 3 and Axios -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="body-style">
    <div id="app" v-cloak>
        <!-- Navbar Dinámica -->
        <nav class="navbar">
            <a href="index.html" class="nav-brand">QUINTA DALAM</a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Habitaciones</a>
                <a href="nosotros.html">Nosotros</a>
                <a href="formulario.html" v-if="user && user.role === 'Admin'">Gestión</a>
                
                <!-- Lógica de Sesión -->
                <template v-if="!user">
                    <a href="login.html" class="btn-nav">Iniciar Sesión</a>
                </template>
                <template v-else>
                    <div class="user-menu" @click="toggleDropdown">
                        {{ user.username }}
                        <div class="user-dropdown" v-if="dropdownOpen">
                            <a href="#" @click.prevent="handleLogout">Cerrar Sesión</a>
                        </div>
                    </div>
                </template>
            </div>
        </nav>

        <header class="header-style">
            <h1>{{ title }}</h1>
            <p>Tradición y Confort en el Corazón de México</p>
        </header>

        <main class="main-style">
            <h2>{{ welcomeTitle }}</h2>
            <p>{{ welcomeText }}</p>
            
            <div class="gallery-container">
                <div v-for="(img, index) in images" 
                     :key="index"
                     class="gallery-item"
                     @mouseover="activeImage = index"
                     @mouseleave="activeImage = null"
                     :class="{ 'active': activeImage === index }">
                    <img :src="img.src" :alt="img.alt">
                    <div class="img-caption">{{ img.alt }}</div>
                </div>
            </div>
        </main>

        <!-- Footer Rediseñado -->
        <footer class="footer-style">
            <div class="footer-content">
                <h3>Contacto</h3>
                <div class="social-icons">
                    <a href="https://www.facebook.com/profile.php?id=61584681841684" target="_blank" title="Facebook">
                        <img src="imagenes_hotel/icons/facebook.svg" alt="Facebook">
                    </a>
                    <a href="https://www.instagram.com/quintadalam" target="_blank" title="Instagram">
                        <img src="imagenes_hotel/icons/instagram.svg" alt="Instagram">
                    </a>
                    <a href="https://www.tiktok.com/@quintadalam" target="_blank" title="TikTok">
                        <img src="imagenes_hotel/icons/tiktok.svg" alt="TikTok">
                    </a>
                </div>
                
                <p class="copyright">© 2024 Hotel Quinta Dalam. Todos los derechos reservados.</p>
                
                <!-- Billetes W3C (Mantenidos exactamente igual) -->
                <div class="w3c-badges">
                    <a href="https://validator.w3.org/nu/?doc=https%3A%2F%2Frogerts-oa.github.io%2FProgramacion-web-APC-ROA%2F">
                        <img src="http://www.w3.org/Icons/valid-html401" alt="Valid HTML!" height="31" width="88">
                    </a>
                    <a href="https://jigsaw.w3.org/css-validator/validator?uri=https%3A%2F%2Frogerts-oa.github.io%2FProgramacion-web-APC-ROA%2F&profile=css3svg&usermedium=all&warning=1&vextwarning=&lang=es">
                        <img src="http://jigsaw.w3.org/css-validator/images/vcss" alt="¡CSS Válido!" style="border:0;width:88px;height:31px">
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                // Inyectamos la lógica compartida
                const auth = authShared.setup();

                const title = ref('QUINTA DALAM');
                const welcomeTitle = ref('Bienvenido');
                const welcomeText = ref('Descubre un refugio donde el tiempo se detiene y la tradición cobra vida. En el Hotel Quinta Dalam, no solo te ofrecemos una habitación, te invitamos a sumergirte en la riqueza cultural de los Pueblos Mágicos de México. Nuestras instalaciones son un tributo a la arquitectura colonial, los colores vibrantes y la calidez que define a nuestra tierra.');
                
                const images = ref([
                    { src: 'imagenes_hotel/Fachada.jpg', alt: 'Fachada del hotel' },
                    { src: 'imagenes_hotel/Lobby.jpg', alt: 'Lobby del hotel' },
                    { src: 'imagenes_hotel/Vista_amanecer.jpg', alt: 'Vista del amanecer' }
                ]);

                const activeImage = ref(null);

                return {
                    ...auth, // Extendemos con user, loading, handleLogout
                    title,
                    welcomeTitle,
                    welcomeText,
                    images,
                    activeImage
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
